<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="heartGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff6b6b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ee5a6f;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- 背景圆形 -->
  <circle cx="100" cy="100" r="90" fill="url(#bgGradient)"/>
  
  <!-- 心形图标 -->
  <path d="M100 160 
           C 100 160, 55 120, 55 95
           C 55 75, 70 65, 85 75
           C 92 80, 100 90, 100 90
           C 100 90, 108 80, 115 75
           C 130 65, 145 75, 145 95
           C 145 120, 100 160, 100 160 Z"
        fill="url(#heartGradient)"
        opacity="0.9"/>
  
  <!-- 脉冲圆环 -->
  <circle cx="100" cy="100" r="70" fill="none" stroke="white" stroke-width="3" opacity="0.3"/>
  
  <!-- 加号（十字）象征急救 -->
  <rect x="95" y="60" width="10" height="30" fill="white" opacity="0.8" rx="2"/>
  <rect x="80" y="70" width="40" height="10" fill="white" opacity="0.8" rx="2"/>
</svg>
